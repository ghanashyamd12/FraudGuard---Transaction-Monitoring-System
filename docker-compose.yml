services:

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

  backend:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - db
      - ml
    restart: always
  ml:
    build: ./ml-service
    ports:
      - "5001:5001"
    restart: always

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: fraudguard
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: always

volumes:
  pgdata:
